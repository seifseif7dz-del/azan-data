    // ==========================================
    // 2. نظام جلب بيانات القرآن من API الحقيقي

    async function fetchQuranFromAPI() {
        try {
            console.log("جاري جلب فهرس المصحف من API...");
            const response = await fetch('https://api.quran.com/api/v4/chapters?language=ar');
            const data = await response.json();
            
            if(data && data.chapters) {
                const surahs = {};
                data.chapters.forEach(surah => {
                    surahs[surah.id] = {
                        name: surah.name_arabic,
                        numberOfAyahs: surah.verses_count,
                        ayahs: [] 
                    };
                });
                
                localStorage.setItem('muezzin_quran_index', JSON.stringify(surahs));
                return surahs;
            }
        } catch (error) {
            console.error("فشل جلب المصحف من API:", error);
        }
        return {};
    }

    async function fetchSurahAyahs(surahId) {
        try {
            const cachedSurah = localStorage.getItem(`muezzin_surah_${surahId}`);
            if (cachedSurah) {
                return JSON.parse(cachedSurah);
            }

            console.log(`جاري جلب آيات سورة ${surahId} من API...`);
            const response = await fetch(`https://api.quran.com/api/v4/chapters/${surahId}/verses?language=ar`);
            const data = await response.json();
            
            if(data && data.verses) {
                const ayahs = data.verses.map(verse => ({
                    numberInSurah: verse.verse_number,
                    text: verse.text_arabic
                }));
                
                localStorage.setItem(`muezzin_surah_${surahId}`, JSON.stringify(ayahs));
                return ayahs;
            }
        } catch (error) {
            console.error(`فشل جلب آيات سورة ${surahId}:`, error);
        }
        return [];
    }

    // ==========================================

    function renderPrayerCards() {
      const grid = document.getElementById('prayers-grid');
      if(!grid) return;
      
      grid.innerHTML = AppState.prayers.map(prayer => {
        const isNext = getNextPrayer()?.name === prayer.name;
        const isRinging = AppState.ringingPrayer === prayer.name;
        const isEnabled = AppState.enabledPrayers[prayer.name];
        const isEditing = AppState.editingPrayer === prayer.name;

        const cardBg = darkMode ? 'bg-black border-yellow-900/50' : 'bg-white shadow-gray-900/5';

        const timeBg = darkMode ? 'bg-yellow-900/30 text-yellow-400' : 'bg-gray-100/50 text-gray-800';
        const borderColor = darkMode ? 'border-yellow-900/50' : 'border-gray-200';
        const btnEditBg = darkMode ? 'bg-yellow-900/30 text-yellow-400 hover:bg-yellow-900/50' : 'bg-gray-100 text-gray-700 hover:bg-gray-200';

    // ==========================================
    // دالة السبحة (مع الأذكار الجديدة)
    // ==========================================
    function renderTasbihView(tab, darkMode) {
        const totalBeads = 33;
        let state = TasbihState;
        
        // التأكد من وجود العداد للذكر الحالي
        if (state.counters[state.selectedDhikr] === undefined) {
            state.counters[state.selectedDhikr] = 0;
        }
        
        let customInputHTML = '';
        if(state.isCustomMode) {
            customInputHTML = `
                <div class="flex items-center gap-2 mt-2 justify-center">
                    <input type="number" id="tasbih-custom-input" value="${state.customInput || state.target}" class="w-20 px-2 py-1 rounded border text-center text-sm" />
                    <button onclick="setCustomTarget()" class="px-3 py-1 ${darkMode ? 'bg-yellow-500 text-black hover:bg-yellow-400' : 'bg-gray-700 text-white hover:bg-gray-600'} text-xs rounded">تأكيد</button>
                    <button onclick="cancelCustomTarget()" class="px-3 py-1 ${darkMode ? 'bg-yellow-900/30 text-yellow-400 hover:bg-yellow-900/50' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'} text-xs rounded">إلغاء</button>
                </div>
            `;
        }

        const adhkar = dhikrList;

        let beadsHTML = '';
        const currentCount = state.counters[state.selectedDhikr] || 0;
        const activeBeads = currentCount % totalBeads;
        const radius = 40;
        const centerX = 50;
        const centerY = 50;
        for(let i=0; i<totalBeads; i++) {
            const angle = (i / totalBeads) * 360 - 90;
            const x = centerX + radius * Math.cos((angle * Math.PI) / 180);
            const y = centerY + radius * Math.sin((angle * Math.PI) / 180);
            const isActive = i < activeBeads;
            const beadColor = isActive 
                ? (darkMode ? '#fbbf24' : '#9ca3af') 
                : (darkMode ? '#374151' : '#e5e7eb');
            beadsHTML += `<circle cx="${x}" cy="${y}" r="${isActive ? 4 : 3}" fill="${beadColor}" class="transition-all duration-200" />`;
        }

        tab.innerHTML = `
            <div class="space-y-3">
                <button onclick="AppState.adhkarView = null; renderAdhkarTab();" class="h-8 text-sm flex items-center ${darkMode ? 'text-yellow-400 hover:bg-yellow-900/30 px-2 rounded' : 'text-gray-600 hover:bg-gray-200 px-2 rounded'}"><i data-lucide="chevron-right" class="w-4 h-4 ml-2"></i> رجوع</button>
                
                <div class="rounded-2xl border shadow-lg p-6 flex flex-col items-center gap-4 w-full ${darkMode ? 'bg-black border-yellow-900/50' : 'bg-white shadow-gray-900/5'}">
                    <h2 class="text-xl font-bold ${darkMode ? 'text-yellow-400' : 'text-gray-800'}">السبحة الإلكترونية</h2>
                    
                    <!-- أزرار الأذكار (شبكي 3 أعمدة) -->
                    <div class="grid grid-cols-3 gap-2 w-full">
                        ${adhkar.map(d => {
                            let displayText = d;
                            if (d === "سيد الاستغفار") {
                                displayText = "سيد الاستغفار";
                            }
                            return `
                            <button onclick="TasbihState.selectedDhikr = '${d}'; renderAdhkarTab();" 
                                class="py-1 px-1 text-xs rounded transition-colors text-center whitespace-nowrap overflow-hidden text-ellipsis
                                ${state.selectedDhikr === d 
                                    ? (darkMode 
                                        ? 'bg-yellow-500 text-black' 
                                        : 'bg-gray-500 text-white')    
                                    : (darkMode 
                                        ? 'bg-yellow-900/30 text-yellow-400 hover:bg-yellow-900/50' 
                                        : 'bg-gray-100 text-gray-700 hover:bg-gray-200')} 
                            ">${displayText}</button>
                            `;
                        }).join('')}
                    </div>

                    <!-- العدّاد الدائري -->
                    <div class="relative w-48 h-48 flex items-center justify-center my-4">
                        <svg class="absolute inset-0 w-full h-full" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="40" fill="none" stroke="${darkMode ? '#374151' : '#e5e7eb'}" strokeWidth="1" strokeDasharray="2 2" />
                            ${beadsHTML}
                        </svg>
                        <button onclick="TasbihState.counters[TasbihState.selectedDhikr] = (TasbihState.counters[TasbihState.selectedDhikr] + 1 === TasbihState.target ? 0 : TasbihState.counters[TasbihState.selectedDhikr] + 1); renderAdhkarTab();" 
                            class="absolute inset-12 rounded-full flex flex-col items-center justify-center border 
                            ${darkMode 
                                ? 'bg-black border-yellow-900/50' 
                                : 'bg-white border-gray-300'}">    
                            <span class="text-4xl font-bold ${darkMode ? 'text-yellow-400' : 'text-gray-800'}">${currentCount}</span>
                            <span class="text-[10px] ${darkMode ? 'text-yellow-200/60' : 'text-gray-500'}">اضغط للعد</span>
                        </button>
                    </div>

    function startIqamahTimer(prayerName, delayMinutes) {
        if (AppState.iqamahTimer) {
            clearInterval(AppState.iqamahTimer);
            AppState.iqamahTimer = null;
        }

        AppState.isIqamahActive = true;
        AppState.iqamahPrayerName = prayerName;
        
        const prayer = AppState.prayers.find(p => p.name === prayerName);
        if (!prayer) return;

        const [h, m] = prayer.time.split(":").map(Number);
        const iqamahTime = new Date();
        iqamahTime.setHours(h, m + delayMinutes, 0, 0);

        AppState.iqamahTimer = setInterval(() => {
            const now = new Date();
            const diff = iqamahTime.getTime() - now.getTime();
            
            if (diff <= 0) {
                clearInterval(AppState.iqamahTimer);
                AppState.iqamahTimer = null;
                AppState.isIqamahActive = false;
                
                // إشعار خارج التطبيق
                if (window.Notification && Notification.permission === "granted") {
                    new Notification("مؤذن - إقامة الصلاة", {
                        body: `حان وقت إقامة صلاة ${prayer.label}`,
                        icon: "/icon.png"
                    });
                } else if (window.Notification && Notification.permission === "default") {
                    Notification.requestPermission();
                }
                
                renderPrayerCards();
                return;
            }
        }, 1000);
    }

    window.downloadAdhkar = function(view) {
        const content = offlineAdhkar[view];
        let text = `أذكار ${view}\n\n`;
        content.forEach((item, i) => { text += `${i+1}. ${item}\n\n`; });
        const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `adhkar_${view}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    };

    function getMuezzinsForPrayer(prayerName) {
      if(prayerName === 'fajr') return muezzinLists.fajr;
      return muezzinLists.dhuhr;
    }

    function getNextPrayer() {
      const nowStr = AppState.currentTime.toTimeString().slice(0, 5);
      const upcoming = AppState.prayers.filter(p => p.time > nowStr && AppState.enabledPrayers[p.name]);
      return upcoming.length > 0 ? upcoming.sort((a, b) => a.time.localeCompare(b.time))[0] : AppState.prayers[0];
    }

    function updateTopWidget() {
      const now = AppState.currentTime;
      const timeDisplay = document.getElementById('current-time-display');
      const dateDisplay = document.getElementById('current-date-display');
      if(timeDisplay) timeDisplay.textContent = formatTime(now);
      if(dateDisplay) dateDisplay.textContent = now.toLocaleDateString("ar-EG", { weekday: "long", year: "numeric", month: "long", day: "numeric" });

      const next = getNextPrayer();
      if(next) {
        const [h, m] = next.time.split(":").map(Number);
        const target = new Date(now);
        target.setHours(h, m, 0, 0);
        if (target < now) target.setDate(target.getDate() + 1);
        const diff = target.getTime() - now.getTime();
        const totalSeconds = Math.floor(diff / 1000);
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;

        const iconEl = document.getElementById('next-prayer-icon');
        const nameEl = document.getElementById('next-prayer-name');
        const countdownEl = document.getElementById('next-prayer-countdown');
        const progressFg = document.getElementById('progress-fg');
        
        if(iconEl) iconEl.textContent = next.icon;
        if(nameEl) nameEl.textContent = next.label;
        if(countdownEl) countdownEl.textContent = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

        if(progressFg) {
          const daySeconds = 24 * 3600;
          const elapsedSeconds = daySeconds - totalSeconds;
          const progress = (elapsedSeconds / daySeconds) * 360;
          progressFg.style.strokeDashoffset = 282.74 - (282.74 * progress) / 360;
        }
      }
    }

        document.getElementById('bg-decor-1').className = 'absolute top-0 right-0 w-72 h-72 rounded-full blur-3xl opacity-20 -translate-y-1/2 translate-x-1/2 pointer-events-none bg-gray-300';

        nav.className = 'fixed bottom-0 left-0 right-0 z-50 border-t backdrop-blur-xl bg-white/90 border-gray-200';
        
        document.getElementById('dialog-inner').className = 'w-full max-w-md max-h-[80vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden bg-white border border-gray-200';
        document.querySelector('#dialog-inner .border-b').className = 'p-4 border-b flex items-center justify-between border-gray-200';
        document.getElementById('dialog-title').className = 'text-base font-bold text-gray-800';
        document.getElementById('dialog-subtitle').className = 'text-xs text-gray-500';
        document.getElementById('btn-close-dialog').className = 'rounded-full w-7 h-7 flex items-center justify-center hover:bg-gray-200 text-gray-600';

        const topCard = document.getElementById('top-card');
        if(topCard) {
            topCard.className = 'md:col-span-2 rounded-2xl border shadow-lg overflow-hidden relative p-5 flex flex-col md:flex-row items-center justify-between gap-4 bg-white border-gray-200';
            
            const clockIcon = topCard.querySelector('.flex.items-center.gap-2.mb-1 i');
            if(clockIcon) clockIcon.className = 'w-3.5 h-3.5 text-gray-600';
            
            const clockLabel = topCard.querySelector('.flex.items-center.gap-2.mb-1 span');
            if(clockLabel) clockLabel.className = 'text-xs font-medium text-gray-500';
            
            const timeDisplay = document.getElementById('current-time-display');
            if(timeDisplay) timeDisplay.className = 'text-3xl md:text-4xl font-bold tracking-tight font-mono text-gray-800';
            
            const dateDisplay = document.getElementById('current-date-display');
            if(dateDisplay) dateDisplay.className = 'mt-1 text-xs text-center text-gray-500';
            
            const progressBg = document.getElementById('progress-bg');
            if(progressBg) progressBg.className = 'stroke-gray-200';
            
            const progressFg = document.getElementById('progress-fg');
            if(progressFg) progressFg.className = 'transition-all duration-1000 ease-linear stroke-gray-600';
            
            const nextLabel = topCard.querySelector('.text-\\[10px\\].font-medium.mb-1');
            if(nextLabel) nextLabel.className = 'text-[10px] font-medium mb-1 text-gray-700';
            
            const nextName = document.getElementById('next-prayer-name');
            if(nextName) nextName.className = 'text-base font-bold text-gray-800';
            
            const nextCountdown = document.getElementById('next-prayer-countdown');
            if(nextCountdown) nextCountdown.className = 'text-xs font-mono text-gray-600';
        }
      }
      lucide.createIcons();
    }

    function switchTab(tabId) {
      AppState.activeTab = tabId;
      updateTheme();
      document.querySelectorAll('#bottom-nav button').forEach(btn => {
        const isActive = btn.dataset.tab === tabId;
        btn.className = `flex flex-col items-center gap-1 py-1.5 px-1 rounded-lg transition-colors ${isActive ? (AppState.nightMode ? 'text-yellow-400 bg-yellow-900/20' : 'text-gray-700 bg-gray-200') : (AppState.nightMode ? 'text-gray-500 hover:bg-yellow-900/20' : 'text-gray-500 hover:bg-gray-100')}`;
      });
      document.querySelectorAll('#main-content > div[id^="tab-"]').forEach(el => {
        el.classList.toggle('hidden', el.id !== `tab-${tabId}`);
      });
    }

    // ==========================================
    // 8. دوال التفاعل (الأزرار والنوافذ)
    // ==========================================
    window.togglePrayer = function(name) {
      AppState.enabledPrayers[name] = !AppState.enabledPrayers[name];
      renderPrayerCards();
    };

    window.startEditPrayer = function(name) {
      const prayer = AppState.prayers.find(p => p.name === name);
      if(prayer) {
        AppState.editingPrayer = name;
        AppState.tempTime = prayer.time;
        AppState.tempMuezzin = AppState.selectedMuezzins[name];
        AppState.tempIqamah = AppState.selectedIqamahMuezzins[name];
        renderPrayerCards();
      }
    };

    window.savePrayerData = function(name) {
      const timeInput = document.getElementById(`edit-time-${name}`);
      const muezzinSelect = document.getElementById(`edit-muezzin-${name}`);
      const iqamahSelect = document.getElementById(`edit-iqamah-${name}`);

      if(timeInput && muezzinSelect && iqamahSelect) {
        const pIndex = AppState.prayers.findIndex(p => p.name === name);
        if(pIndex !== -1) AppState.prayers[pIndex].time = timeInput.value;
        AppState.selectedMuezzins[name] = muezzinSelect.value;
        AppState.selectedIqamahMuezzins[name] = iqamahSelect.value;

        AppState.editingPrayer = null;
        renderPrayerCards();
        
        const toast = document.getElementById('toast-container');
        toast.classList.remove('hidden');
        setTimeout(() => toast.classList.add('hidden'), 2000);
      }
    };

    window.cancelEditPrayer = function() {
      AppState.editingPrayer = null;
      renderPrayerCards();
    };

    window.openMuezzinDialog = function(prayerName) {
      AppState.openDialogType = prayerName;
      renderMuezzinDialogContent(prayerName, false);
      document.getElementById('dialog-container').classList.remove('hidden');
      document.getElementById('dialog-container').classList.add('flex');
    };

    window.openMuezzinDialogForCategory = function(categoryName) {
        AppState.openDialogType = categoryName;
        renderMuezzinDialogContent(categoryName, false);
        document.getElementById('dialog-container').classList.remove('hidden');
        document.getElementById('dialog-container').classList.add('flex');
    };

    window.openGeneralPrayersSelection = function() {
        const dialog = document.getElementById('dialog-container');
        const title = document.getElementById('dialog-title');
        const sub = document.getElementById('dialog-subtitle');
        const list = document.getElementById('dialog-list');
        
        AppState.openDialogType = 'prayer_selection';
        title.textContent = 'اختر الصلاة';
        sub.textContent = 'اختر الصلاة لاختيار المؤذن الخاص بها';
        
        const prayersList = ['dhuhr', 'asr', 'maghrib', 'isha'];
        list.innerHTML = prayersList.map(pName => {
            const prayer = AppState.prayers.find(p => p.name === pName);
            return `
            <div onclick="openMuezzinDialog('${pName}')" class="p-3 rounded-xl flex items-center gap-3 transition-colors cursor-pointer hover:${AppState.nightMode ? 'bg-yellow-900/20' : 'bg-gray-100'} ${AppState.nightMode ? 'bg-black' : 'bg-white'} shadow-sm mb-2">
                <div class="text-2xl">${prayer.icon}</div>
                <div class="flex-1">
                <h3 class="font-bold ${AppState.nightMode ? 'text-yellow-400' : 'text-gray-800'}">${prayer.label}</h3>
                <p class="text-xs ${AppState.nightMode ? 'text-yellow-200/60' : 'text-gray-500'}">المؤذن الحالي: ${AppState.selectedMuezzins[pName]}</p>
                </div>
                <i data-lucide="chevron-left" class="w-4 h-4 ${AppState.nightMode ? 'text-yellow-700' : 'text-gray-400'}"></i>
            </div>
            `;
        }).join('');
        
        lucide.createIcons();
        dialog.classList.remove('hidden');
        dialog.classList.add('flex');
    };

    window.openIqamahMuezzinForPrayer = function(prayerName) {
        AppState.openDialogType = prayerName + '_iqamah';
        renderMuezzinDialogContent(prayerName, true);
        document.getElementById('dialog-container').classList.remove('hidden');
        document.getElementById('dialog-container').classList.add('flex');
    };

    function renderMuezzinDialogContent(prayerName, isIqamah) {
      const title = document.getElementById('dialog-title');
      const sub = document.getElementById('dialog-subtitle');
      const list = document.getElementById('dialog-list');
      const prayerLabel = AppState.prayers.find(p => p.name === prayerName)?.label || prayerName;
      
      if(isIqamah) {
        title.textContent = `اختيار مؤذن إقامة لصلاة ${prayerLabel}`;
        sub.textContent = `المؤذن الحالي: ${AppState.selectedIqamahMuezzins[prayerName] || 'لم يتم الاختيار'}`;
      } else {
        title.textContent = `اختيار مؤذن لصلاة ${prayerLabel}`;
        sub.textContent = `المؤذن الحالي: ${AppState.selectedMuezzins[prayerName] || 'لم يتم الاختيار'}`;
      }
      
      let muezzinsForThisPrayer = isIqamah ? muezzinLists.iqamah : (prayerName === 'fajr' ? muezzinLists.fajr : muezzinLists.dhuhr);
      
      list.innerHTML = muezzinsForThisPrayer.map(m => {
        let isSelected = isIqamah ? AppState.selectedIqamahMuezzins[prayerName] === m : AppState.selectedMuezzins[prayerName] === m;
        const darkMode = AppState.nightMode;
        return `
          <div onclick="selectSpecificMuezzin('${prayerName}', '${m}', ${isIqamah})" class="p-2.5 rounded-xl flex items-center justify-between transition-colors cursor-pointer ${isSelected ? (darkMode ? 'bg-yellow-900/40 ring-2 ring-yellow-400' : 'bg-gray-200 ring-2 ring-gray-500') : (darkMode ? 'hover:bg-yellow-900/20' : 'hover:bg-gray-100')}">
            <div class="flex items-center gap-2">
              <div class="w-8 h-8 rounded-full flex items-center justify-center ${isSelected ? (darkMode ? 'bg-yellow-500 text-black' : 'bg-gray-700 text-white') : (darkMode ? 'bg-yellow-900/30 text-yellow-400' : 'bg-gray-200 text-gray-700')}"><i data-lucide="users" class="w-3.5 h-3.5"></i></div>
              <span class="text-sm font-medium ${darkMode ? 'text-yellow-400' : 'text-gray-800'}">${m}</span>
            </div>
            <div class="flex items-center gap-1">
              <button onclick="event.stopPropagation();" class="rounded-full h-7 w-7 flex items-center justify-center ${darkMode ? 'hover:bg-yellow-900/30 text-yellow-400' : 'hover:bg-gray-200 text-gray-700'}"><i data-lucide="play" class="w-3.5 h-3.5"></i></button>
              ${isSelected ? `
                <div onclick="event.stopPropagation(); deselectSpecificMuezzin('${prayerName}', ${isIqamah})" class="w-7 h-7 rounded-full flex items-center justify-center ${darkMode ? 'bg-yellow-500 text-black' : 'bg-gray-700 text-white'} cursor-pointer hover:${darkMode ? 'bg-yellow-400' : 'bg-gray-600'}">
                  <i data-lucide="check" class="w-3.5 h-3.5"></i>
                </div>
              ` : ''}
            </div>
          </div>
        `;
      }).join('');
      lucide.createIcons();
    }

    window.selectSpecificMuezzin = function(prayerName, muezzinName, isIqamah) {
      if(isIqamah) AppState.selectedIqamahMuezzins[prayerName] = muezzinName;
      else AppState.selectedMuezzins[prayerName] = muezzinName;
      
      renderPrayerCards();
      document.getElementById('dialog-container').classList.add('hidden');
      AppState.openDialogType = null;
    };

    window.deselectSpecificMuezzin = function(prayerName, isIqamah) {
      if(isIqamah) AppState.selectedIqamahMuezzins[prayerName] = 'محمد اللحيدان';
      else AppState.selectedMuezzins[prayerName] = prayerName === 'fajr' ? 'ياسر الدوسري' : 'مولانا كورتش';
      
      renderPrayerCards();
      document.getElementById('dialog-container').classList.add('hidden');
      AppState.openDialogType = null;
    };

    // ==========================================
    // 9. ربط الأحداث الرئيسية
    // ==========================================
    document.getElementById('btn-toggle-sound').onclick = function() {
      AppState.activeSound = !AppState.activeSound;
      document.getElementById('icon-sound').dataset.lucide = AppState.activeSound ? 'volume-2' : 'volume-x';
      lucide.createIcons();
    };

    document.getElementById('btn-toggle-night-mode').onclick = function() {
      AppState.nightMode = !AppState.nightMode;
      updateTheme();
      renderAllTabs();
    };

    document.querySelectorAll('#bottom-nav button').forEach(btn => {
      btn.onclick = function() { 
        switchTab(this.dataset.tab); 
        renderAllTabs();
      };
    });

    document.getElementById('btn-close-dialog').onclick = function() {
      document.getElementById('dialog-container').classList.add('hidden');
      AppState.openDialogType = null;
    };

    document.getElementById('dialog-container').onclick = function(e) {
      if(e.target === this) {
        this.classList.add('hidden');
        AppState.openDialogType = null;
      }
    };

    // ==========================================
    // 10. تهيئة وتشغيل التطبيق
    // ==========================================
    async function initApp() {
        // 1. أوقات الصلاة الافتراضية
        AppState.prayers = [
          { name: "fajr", label: "الفجر", time: "05:00", icon: "🌅" },
          { name: "dhuhr", label: "الظهر", time: "12:30", icon: "☀️" },
          { name: "asr", label: "العصر", time: "15:45", icon: "🌤️" },
          { name: "maghrib", label: "المغرب", time: "18:15", icon: "🌇" },
          { name: "isha", label: "العشاء", time: "19:45", icon: "🌙" },
        ];
        
        // 2. جلب فهرس المصحف من API
        AppState.quranIndex = await fetchQuranFromAPI();
        
        // 3. رسم التطبيق لأول مرة
        renderAllTabs();
        updateTopWidget();
        updateTheme();
        switchTab('home');
        
        // تحديث الوقت والعداد كل ثانية
        setInterval(() => {
          AppState.currentTime = new Date();
          updateTopWidget();
          
          const current = AppState.currentTime.toTimeString().slice(0, 5);
          AppState.prayers.forEach((p) => {
            if (p.time === current && AppState.enabledPrayers[p.name]) {
              AppState.ringingPrayer = p.name;
              const ring = document.getElementById('ringing-notification');
              document.getElementById('ringing-text').textContent = `حان وقت صلاة ${p.label}`;
              ring.classList.remove('hidden');
              setTimeout(() => {
                AppState.ringingPrayer = null;
                ring.classList.add('hidden');
              }, 30000);
            }
          });
        }, 1000);
    }

    // تشغيل التطبيق
    initApp();

  </script>
</body>
</html>
